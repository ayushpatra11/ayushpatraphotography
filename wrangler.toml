name = "ayushpatraphotography"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Build command runs automatically before `wrangler deploy`.
# @cloudflare/next-on-pages outputs a multi-file worker (_worker.js/ directory);
# bundle-worker.mjs patches variable dynamic imports and runs esbuild to produce
# a single file that wrangler can upload.
[build]
command = "node scripts/bundle-worker.mjs"

main = ".vercel/output/static/_worker.bundled.js"

[assets]
directory = ".vercel/output/static"

# Create this bucket in Cloudflare dashboard → R2 before first deploy.
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ayushpatraphotography-photos"

# Secrets — set in Cloudflare dashboard → Workers & Pages → your worker → Settings → Variables:
#   ADMIN_PASSWORD — password for the /studio upload portal
#   AUTH_SECRET    — any random 32-char string (signs session cookies)
