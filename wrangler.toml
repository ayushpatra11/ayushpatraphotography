name = "ayushpatraphotography"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# @cloudflare/next-on-pages outputs to .vercel/output/static.
# wrangler pages deploy uploads the full directory (including _worker.js/)
# so dynamic imports between route modules work natively on Pages.
pages_build_output_dir = ".vercel/output/static"

[build]
command = "npx @cloudflare/next-on-pages"

# Create this bucket in Cloudflare dashboard → R2 before first deploy,
# then add the binding under Pages → Settings → Functions → R2 bucket bindings.
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ayushpatraphotography-photos"

