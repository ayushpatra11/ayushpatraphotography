name = "ayushpatraphotography"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Output directory produced by @cloudflare/next-on-pages
pages_build_output_dir = ".vercel/output/static"

# R2 binding — create this bucket in the Cloudflare dashboard first
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ayushpatraphotography-photos"

# Secrets (set via Cloudflare dashboard → Pages → Settings → Environment variables):
#   ADMIN_PASSWORD — password for the /studio upload portal
#   AUTH_SECRET    — random 32-char string for signing session cookies
